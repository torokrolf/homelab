apiVersion: v1
kind: Service
metadata:
  name: vaultwarden-service
  namespace: identity
spec:
  type: NodePort 
  selector:
    app: vaultwarden
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 31080 
    - name: websocket
      protocol: TCP
      port: 3012
      targetPort: 3012
      nodePort: 30120 

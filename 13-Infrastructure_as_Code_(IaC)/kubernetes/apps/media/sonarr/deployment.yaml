apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarr
  template:
    metadata:
      labels:
        app: sonarr
    spec:
      nodeSelector:
        kubernetes.io/hostname: k3s-server-01-225
      containers:
        - name: sonarr
          image: lscr.io/linuxserver/sonarr:4.0.17
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Europe/Budapest
          ports:
            - containerPort: 8989
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data
      volumes:
        - name: config
          hostPath:
            path: /opt/app-data/media-stack/sonarr/config
            type: DirectoryOrCreate
        - name: data
          hostPath:
            path: /mnt/torrent/data
            type: Directory


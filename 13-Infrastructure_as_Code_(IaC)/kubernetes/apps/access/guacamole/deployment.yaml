apiVersion: apps/v1
kind: Deployment
metadata:
  name: guacamole
  namespace: access
spec:
  replicas: 1
  selector:
    matchLabels:
      app: guacamole
  template:
    metadata:
      labels:
        app: guacamole
    spec:
      containers:
        - name: guacamole
          image: guacamole/guacamole:1.6.0
          env:
            # --- GUACD ---
            - name: GUACD_HOSTNAME
              value: "localhost"
            # --- DB ---
            - name: POSTGRESQL_HOSTNAME
              value: "guacamole-db"
            - name: POSTGRESQL_DATABASE
              value: "guacamole_db"
            - name: POSTGRESQL_USERNAME
              value: "guacamole_user"
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: guacamole-secrets
                  key: POSTGRES_PASSWORD
            # --- OPENID (1.6.0+) ---
            - name: OPENID_ENABLED
              value: "true"
            - name: OPENID_AUTHORIZATION_ENDPOINT
              value: "https://authentik.trkrolf.com/application/o/authorize/"
            - name: OPENID_ISSUER
              value: "https://authentik.trkrolf.com/application/o/guacamole/"
            - name: OPENID_JWKS_ENDPOINT
              value: "https://authentik.trkrolf.com/application/o/guacamole/jwks/"
            - name: OPENID_REDIRECT_URI
              value: "https://guacamole.trkrolf.com/"
            - name: OPENID_CLIENT_ID
              value: "FNUd9yb1eueS8SzWB3Xe1fnkbb2S1pzI4AEREkhc"
            - name: OPENID_USERNAME_CLAIM_TYPE
              value: "preferred_username"
            - name: OPENID_GROUPS_CLAIM
              value: "groups"
            - name: EXTENSION_PRIORITY
              value: "openid" 
          ports:
            - containerPort: 8080
        - name: guacd
          image: guacamole/guacd:1.6.0
          ports:
            - containerPort: 4822
---
apiVersion: v1
kind: Service
metadata:
  name: guacamole
  namespace: access
spec:
  type: NodePort
  selector:
    app: guacamole
  ports:
    - name: http
      port: 8085
      targetPort: 8080
      nodePort: 30015

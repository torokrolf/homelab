apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: guacamole-db
  namespace: access
spec:
  serviceName: "guacamole-db"
  replicas: 1
  selector:
    matchLabels:
      app: guacamole-db
  template:
    metadata:
      labels:
        app: guacamole-db
    spec:
      containers:
      - name: postgres
        image: postgres:15.18
        env:
          - name: POSTGRES_DB
            value: "guacamole_db"
          - name: POSTGRES_USER
            value: "guacamole_user"
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: guacamole-secrets
                key: POSTGRES_PASSWORD
        ports:
          - containerPort: 5432
        volumeMounts:
          - name: db-data
            mountPath: /var/lib/postgresql/data
          - name: init-script
            mountPath: /docker-entrypoint-initdb.d/initdb.sql
            subPath: initdb.sql
      volumes:
        - name: db-data
          hostPath:
            path: /opt/app-data/access-stack/guacamole/db
            type: DirectoryOrCreate
        - name: init-script
          configMap:
            name: guacamole-db-init
---
apiVersion: v1
kind: Service
metadata:
  name: guacamole-db
  namespace: access
spec:
  selector:
    app: guacamole-db
  ports:
    - port: 5432
      targetPort: 5432
